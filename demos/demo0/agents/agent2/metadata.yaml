name: Underwriting Agent
description: >
  Automates new-business underwriting for health insurance carriers.
  Underwriters submit applicant data, medical history, and supporting
  documents; the agent scores risk against configurable clinical and
  actuarial rule sets, flags pre-existing conditions or data gaps for
  human review, and produces a recommended coverage tier, premium
  adjustment, or decline decision — complete with a regulatory-ready
  audit trail for each case.
use_case: underwriting
domain: insurance
api_port: 3002
frontend_port: 8002
entry_point: "agents.demo2.apis.main:app"
api_version: "1.0.0"
status: stub
version: "0.1.0"
template_version: "1.0"
