# agent.config.yaml — agent5 (Trianz Concierge) DEFINITION + DEFAULTS (git-tracked).
#
# This file ships in git and is never written at runtime. It declares the fixed
# parts (personas, integration catalog, capabilities) plus DEFAULT values for the
# operator-editable settings. Operator OVERRIDES live in state/config/setup.yaml,
# written from the marketplace Config page. The agent runs the EFFECTIVE config =
# these defaults ⊕ setup.yaml. Until setup.yaml exists the agent is `awaiting_setup`
# (up, but refuses to process). Apply setup changes with POST /admin/restart.
#
# Page keys used in visible_pages / default_landing:
#   home | chat | processing | memory | architecture | test-runner | config

personas:
  - id: visitor
    label: Prospect
    icon: "🧑‍💼"
    description: "Explore Trianz's offerings by voice or text and book a conversation."
    visible_pages: [home, chat]
    default_landing: chat
  - id: sales
    label: Trianz Sales
    icon: "📈"
    description: "Review captured leads and booked meetings; everything a prospect sees."
    visible_pages: [home, chat, processing, memory, test-runner]
    default_landing: chat
  - id: admin
    label: Administrator
    icon: "⚙️"
    description: "Everything Sales can do, plus architecture and configuration."
    visible_pages: [home, chat, processing, memory, architecture, test-runner, config]
    default_landing: chat

defaults:
  # TEXT model for the SSE /chat path + sales/scheduling sub-agents (blank = squad default).
  model_id: "us.amazon.nova-pro-v1:0"
  # Amazon Nova Sonic model id for the real-time voice path.
  sonic_model_id: "amazon.nova-sonic-v1:0"

  # ── Authentication (real AWS SES email-OTP gate) ──
  ses_sender: ""                       # verified SES sender, e.g. "concierge@trianz.com" (REQUIRED to send)
  sales_contact_email: ""              # organizer on meeting invites (defaults to ses_sender if blank)
  allowlist_domains:                   # business-email allowlist (empty ⇒ any non-public domain)
    - "trianz.com"
    - "*.trianz.com"
  blocked_public_domains: []           # empty ⇒ use the built-in public-provider blocklist
  otp_ttl_seconds: 600                 # one-time-code lifetime

features:
  # Chat & voice are never gated. This gates the generic Processing run (Sales/Admin
  # only) so the durable human-in-the-loop machinery is demonstrable; flip off for a
  # fully unattended front door.
  hitl_approval: true

integrations:           # external systems this agent can connect to
  # The platform Config page renders a "Connect" button per entry. These are IAM-based
  # (no OAuth): they render as mock toggles confirming the operator has wired AWS access.
  - id: aws_ses
    name: "AWS SES"
    category: productivity
    description: "Sends OTP codes and calendar invites. Needs a verified sender + sandbox exit."
    auth_type: mock
    auth_url: ""
    connected: false
  - id: nova_sonic
    name: "Amazon Nova Sonic"
    category: cloud
    description: "Bedrock speech-to-speech model powering the voice front door."
    auth_type: mock
    auth_url: ""
    connected: false

capabilities:           # rendered on the Architecture page so the agent self-documents
  tools:
    - search_trianz_knowledge
    - recommend_offering
    - capture_lead
    - request_human_meeting
    - list_runs
    - get_memory
    - get_config
    - get_health
  can:
    - "Hold a real-time voice conversation (Amazon Nova Sonic) and a text chat, cross-modal."
    - "Explain Trianz offerings, Concierto, services and SI work, grounded in the content/ knowledge base."
    - "Qualify a visitor's need and recommend the right Trianz offering."
    - "Capture a qualified lead and email a calendar invite to book a human conversation (AWS SES)."
    - "Gate access to verified business emails via an SES one-time-code (allowlist + public-domain block)."
  cannot:
    - "Talk to visitors using public/free email domains (gmail, yahoo, …) — they are blocked at the gate."
    - "Write to a CRM or a real calendar system (scheduling is by emailed .ics invite only)."
    - "Make irreversible external changes without human approval when HITL is enabled."
    - "Access another agent's state (each agent is fully self-contained)."
