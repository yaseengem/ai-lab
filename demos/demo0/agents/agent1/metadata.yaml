# yaml-language-server: $schema=../../schemas/agent-metadata.schema.json
name: Claim Processing Agent
description: >
  Automates end-to-end health insurance claims processing for carriers and
  third-party administrators. Policyholders or provider billing teams submit
  medical claims; the agent validates coverage eligibility, runs automated
  fraud and duplicate-claim detection, routes complex cases to a medical
  reviewer, and escalates high-value or disputed claims to a human supervisor
  before issuing a pay, deny, or pend decision with a full audit trail.
use_case: claims_processing
domain: insurance
api_port: 3001
frontend_port: 8001
entry_point: "agents.demo1.apis.main:app"
api_version: "2.0.0"
status: active
version: "1.0.0"
template_version: "1.0"
