app:
  name: "AI Agents Squad"
  description: "AI agent marketplace — demo0 of AI Lab"

ports:
  platform_frontend: 8001   # marketplace UI
  platform_backend: 8002    # agent scanner API
  agent_frontend:
    start: 8010
    end: 8099
  agent_backend:
    start: 8011
    end: 8099

defaults:
  memory_backend: local
  approval_timeout_seconds: 86400
  bedrock_model_id: "us.anthropic.claude-sonnet-4-20250514-v1:0"
  aws_region: us-east-1
